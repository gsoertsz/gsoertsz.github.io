<nav class="navbar navbar-expand-lg border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold fs-5" href="{{ site.url | default: '/' }}/index.html">
        <i class="bi bi-pencil-square me-2"></i>{{ site.title }}
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="navbar-nav ms-auto">
          {% for item in site.data.navbar %}
          <a class="nav-link" href="{{item.link}}">{{ item.name }}</a>
          {% endfor %}
          <button class="btn btn-link nav-link" id="themeToggle" aria-label="Toggle dark mode">
            <i class="bi bi-moon"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <script>
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    
    function updateThemeIcon() {
      const isDark = html.getAttribute('data-bs-theme') === 'dark';
      themeToggle.innerHTML = isDark ? '<i class="bi bi-sun"></i>' : '<i class="bi bi-moon"></i>';
    }

    function updateHighlightJsTheme(theme) {
      const lightLink = document.getElementById('hljs-light');
      const darkLink = document.getElementById('hljs-dark');
      if (theme === 'dark') {
        darkLink.disabled = false;
        lightLink.disabled = true;
      } else {
        darkLink.disabled = true;
        lightLink.disabled = false;
      }
      // Re-highlight code blocks with new theme
      if (window.hljs) {
        document.querySelectorAll('pre code').forEach((el) => {
          hljs.highlightElement(el);
        });
      }
    }

    themeToggle.addEventListener('click', (e) => {
      e.preventDefault();
      const isDark = html.getAttribute('data-bs-theme') === 'dark';
      const newTheme = isDark ? 'light' : 'dark';
      html.setAttribute('data-bs-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon();
      updateHighlightJsTheme(newTheme);
    });

    // Initialize icon on page load
    updateThemeIcon();
    
    // Highlight code blocks after page loads
    if (window.hljs) {
      hljs.highlightAll();
    }
  </script>
